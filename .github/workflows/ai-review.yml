name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    # Run on new/updated PRs, or when someone comments @claude on a PR
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Automatic review prompt on new PRs
          direct_prompt: |
            Review this pull request for the ChronicPal project (AI-powered chronic treatment companion).

            Apply these project-specific critical rules:

            **PHI Safety (ADR-6)**
            - NEVER log health data (lab values, symptoms, medications) in errors, console.log, or third-party services
            - Winston structured logger with explicit field allowlists only

            **Auth (ADR-3)**
            - NEVER store JWT tokens in localStorage — httpOnly cookies or NextAuth session only
            - All protected routes must check session via auth() or useSession()

            **Database (ADR-5)**
            - NEVER use Supabase client SDK — all DB access through Prisma
            - Multi-table writes must use Prisma transactions

            **AI (ADR-4)**
            - NEVER call Claude API from frontend — all AI calls go through backend (Route Handlers)

            **Validation**
            - NEVER skip Zod validation, even on simple endpoints
            - Use .issues[0].message (Zod v4 API, not .errors)

            **General**
            - NEVER commit .env files
            - NEVER hardcode medical constants — put in lib/constants.ts
            - Route handlers must use withAuth() wrapper for protected endpoints
            - Response shape: { success: boolean, data?: T, error?: string }

            Provide: (1) overall assessment, (2) any rule violations with file:line references, (3) specific improvement suggestions.
          # Allow @claude mentions to trigger follow-up reviews
          trigger_phrase: '@claude'
